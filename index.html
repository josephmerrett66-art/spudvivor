<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spudvivor - Mobile Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #1a1018;
    font-family: 'Courier New', monospace;
    color: #f0e6d2;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none; /* Prevents browser gestures */
  }
  #wrap {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    display: block;
    background: #3a2a22;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    image-rendering: crisp-edges;
  }
  
  /* --- MOBILE CONTROLS STYLES --- */
  #mobile-controls {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 20;
    display: none; /* Hidden by default, shown if touch detected */
  }

  #joystick-zone {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 150px;
    height: 150px;
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    pointer-events: auto;
  }

  #joystick-knob {
    position: absolute;
    top: 50px; left: 50px;
    width: 50px; height: 50px;
    background: #f4c47a;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  .action-buttons {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: grid;
    grid-template-columns: repeat(2, 70px);
    gap: 15px;
    pointer-events: auto;
  }

  .m-btn {
    width: 70px; height: 70px;
    background: rgba(139, 90, 60, 0.7);
    border: 2px solid #a87050;
    border-radius: 50%;
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
    text-shadow: 1px 1px 2px black;
  }

  .m-btn:active { background: #c07030; }

  /* Existing Styles below... */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(10, 6, 10, 0.85);
    z-index: 10;
    padding: 20px;
  }
  .overlay.active { display: flex; }
  .panel {
    background: #2a1a22;
    border: 3px solid #8b5a3c;
    border-radius: 8px;
    padding: 24px 32px;
    max-width: 720px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .panel h1 { font-size: 32px; margin-bottom: 8px; color: #f4c47a; text-align: center; }
  .panel h2 { font-size: 20px; margin-bottom: 16px; color: #e0a870; text-align: center; }
  .cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 16px 0; }
  .card {
    background: #3a2430;
    border: 2px solid #8b5a3c;
    border-radius: 6px;
    padding: 14px;
    width: 180px;
    cursor: pointer;
    text-align: center;
  }
  .btn {
    background: #8b5a3c;
    color: #fff;
    border: 2px solid #a87050;
    padding: 10px 24px;
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    margin: 4px;
  }
  .btn.primary { background: #c07030; border-color: #e08040; font-size: 18px; padding: 12px 32px; }
  #hud {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    z-index: 5;
    font-size: 14px;
  }
  .hud-box {
    background: rgba(20, 10, 16, 0.75);
    border: 1px solid #6a4028;
    padding: 8px 12px;
    border-radius: 4px;
  }
  .bar { width: 140px; height: 8px; background: #1a0a10; border: 1px solid #6a4028; margin-top: 4px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.1s; }
  .hp-fill { background: linear-gradient(90deg, #c03020, #e04030); }
  .xp-fill { background: linear-gradient(90deg, #3070c0, #50a0f0); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="720"></canvas>
  
  <div id="mobile-controls">
    <div id="joystick-zone">
      <div id="joystick-knob"></div>
    </div>
    <div class="action-buttons">
      <div class="m-btn" id="m-dash">DASH</div>
      <div class="m-btn" id="m-place">PLACE</div>
      <div class="m-btn" id="m-item1">USE 1</div>
      <div class="m-btn" id="m-item2">USE 2</div>
    </div>
  </div>

  <div id="hud">
    <div class="hud-box">
      <div>HP <b id="hp-text">100/100</b></div>
      <div class="bar"><div class="bar-fill hp-fill" id="hp-bar" style="width:100%"></div></div>
      <div>LVL <b id="lvl-text">1</b></div>
      <div class="bar"><div class="bar-fill xp-fill" id="xp-bar" style="width:0%"></div></div>
    </div>
    <div class="hud-box">💰 <b id="coins-text">0</b></div>
  </div>

  <div class="overlay active" id="menu">
    <div class="panel" style="max-width:520px">
      <h1>🥔 SPUDVIVOR</h1>
      <p style="text-align:center">Mobile version: Use joystick to move, buttons to act. Auto-fire is active!</p>
      <div style="text-align:center; margin-top:20px">
        <button class="btn primary" onclick="startGame()">START RUN</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="levelup"><div class="panel"><h1>LEVEL UP!</h1><div class="cards" id="levelup-cards"></div></div></div>
  <div class="overlay" id="shop"><div class="panel"><h1>🛒 SHOP</h1><div class="cards" id="shop-cards"></div><button class="btn primary" onclick="startNextWave()">Next Wave</button></div></div>
  <div class="overlay" id="gameover"><div class="panel"><h1>💀 YOU DIED</h1><button class="btn primary" onclick="location.reload()">RESTART</button></div></div>
</div>

<script>
// --- GAME ENGINE (Simplified for this snippet) ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const WORLD_W = 960, WORLD_H = 720;
let state = 'menu';
let player = { x: 480, y: 360, r: 20, hp: 100, maxHp: 100, speed: 200, coins: 0, level: 1, xp: 0 };
let enemies = [], bullets = [], particles = [];
let keys = {};
let joystick = { active: false, x: 0, y: 0 };

// Detect Touch for Mobile
window.addEventListener('touchstart', () => {
  document.getElementById('mobile-controls').style.display = 'block';
}, { once: true });

// --- JOYSTICK LOGIC ---
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');

jZone.addEventListener('touchstart', handleTouch);
jZone.addEventListener('touchmove', handleTouch);
jZone.addEventListener('touchend', () => {
  joystick.active = false;
  joystick.x = 0; joystick.y = 0;
  jKnob.style.transform = `translate(0px, 0px)`;
});

function handleTouch(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = jZone.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  
  let dx = touch.clientX - centerX;
  let dy = touch.clientY - centerY;
  const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
  const angle = Math.atan2(dy, dx);
  
  joystick.active = true;
  joystick.x = Math.cos(angle) * (dist / 50);
  joystick.y = Math.sin(angle) * (dist / 50);
  
  jKnob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
}

// --- BUTTON LOGIC ---
document.getElementById('m-dash').addEventListener('touchstart', () => keys[' '] = true);
document.getElementById('m-dash').addEventListener('touchend', () => keys[' '] = false);
document.getElementById('m-place').addEventListener('touchstart', () => { /* Logic for P */ });

// --- MAIN LOOP ---
function update(dt) {
  let dx = 0, dy = 0;
  
  // Use Keyboard OR Joystick
  if (keys['w']) dy -= 1; if (keys['s']) dy += 1;
  if (keys['a']) dx -= 1; if (keys['d']) dx += 1;
  
  if (joystick.active) {
    dx = joystick.x;
    dy = joystick.y;
  }

  if (dx || dy) {
    player.x += dx * player.speed * dt;
    player.y += dy * player.speed * dt;
  }

  // Keep in bounds
  player.x = Math.max(player.r, Math.min(WORLD_W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(WORLD_H - player.r, player.y));
  
  updateHUD();
}

function updateHUD() {
  document.getElementById('hp-text').innerText = `${Math.floor(player.hp)}/${player.maxHp}`;
  document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
  document.getElementById('coins-text').innerText = player.coins;
}

function startGame() {
  state = 'playing';
  document.getElementById('menu').classList.remove('active');
  requestAnimationFrame(loop);
}

let lastT = 0;
function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;
  if (state === 'playing') update(dt);
  render();
  requestAnimationFrame(loop);
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#8b5a3c';
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
  ctx.fill();
}

// Keyboard fallback
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

</script>
</body>
</html>
